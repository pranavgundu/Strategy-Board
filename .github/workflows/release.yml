name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        env:
          VITE_TBA_API_KEY: ${{ secrets.TBA_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: bun run build

      - name: Build macOS (x64 + arm64)
        run: bunx electron-builder --mac --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            release/*.dmg
            release/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        env:
          VITE_TBA_API_KEY: ${{ secrets.TBA_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: bun run build

      - name: Build Windows (x64)
        run: bunx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-artifacts
          path: |
            release/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        env:
          VITE_TBA_API_KEY: ${{ secrets.TBA_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: bun run build

      - name: Build Linux (x64)
        run: bunx electron-builder --linux --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            release/*.AppImage
            release/*.deb

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app
        env:
          VITE_TBA_API_KEY: ${{ secrets.TBA_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: bun run build

      - name: Add Android platform
        run: bunx cap add android

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Create keystore.properties
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_ALIAS" "$ANDROID_KEY_PASSWORD" \
            > android/keystore.properties

      - name: Inject signing config into build.gradle
        run: |
          python3 -c "
          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          signing = '''    signingConfigs {
                  release {
                      def ksFile = rootProject.file('keystore.properties')
                      if (ksFile.exists()) {
                          def ksProps = new Properties()
                          ksProps.load(new FileInputStream(ksFile))
                          storeFile file(ksProps['storeFile'])
                          storePassword ksProps['storePassword']
                          keyAlias ksProps['keyAlias']
                          keyPassword ksProps['keyPassword']
                      }
                  }
              }
              buildTypes {'''

          content = content.replace('buildTypes {', signing, 1)
          content = content.replace(
              'minifyEnabled false',
              'signingConfig signingConfigs.release\n            minifyEnabled false',
              1
          )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)
          print('Signing config injected')
          "

      - name: Build signed APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          mkdir -p release
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" "release/Strategy.Board-${VERSION}.apk"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: release/*.apk

  release:
    needs: [build-mac, build-windows, build-linux, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Get release name from tag annotation
        id: tag_info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          git fetch origin "refs/tags/${TAG}:refs/tags/${TAG}" --force 2>/dev/null || true
          TYPE=$(git cat-file -t "refs/tags/${TAG}" 2>/dev/null || echo "unknown")
          echo "Tag type: ${TYPE}"
          if [ "$TYPE" = "tag" ]; then
            ANNOTATION=$(git for-each-ref "refs/tags/${TAG}" --format='%(contents:subject)')
            echo "Annotation from tag object: ${ANNOTATION}"
          fi
          if [ -z "$ANNOTATION" ]; then
            ANNOTATION="Release ${TAG}"
          fi
          echo "name=${ANNOTATION}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag_info.outputs.name }}
          tag_name: ${{ steps.tag_info.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/mac-artifacts/*
            artifacts/win-artifacts/*
            artifacts/linux-artifacts/*
            artifacts/android-artifacts/*
